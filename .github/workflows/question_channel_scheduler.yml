name: Schedule Question Channel Events

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'First Wednesday to schedule from (YYYY-MM-DD)'
        required: true
        type: string
      end_date:
        description: 'Last date to schedule up to (YYYY-MM-DD, inclusive)'
        required: true
        type: string

jobs:
  schedule-question-channel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run scheduler
        env:
          ASSEMBLED_API_KEY: ${{ secrets.ASSEMBLED_API_KEY }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
        run: python question_channel_scheduler.py
